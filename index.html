<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="description" content="تطبيق الأولمبياد - دروس وتمارين تفاعلية" />

  <title>أولمبياد الفيزياء والكيمياء</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- ===== SPLASH SCREEN ===== -->
  <div id="splash-screen" class="splash">
    <div class="splash__inner">
      <img src="assets/icons/icon-192.png" alt="شعار التطبيق" class="splash__logo" />
      <h1 class="splash__title"> >أولمبياد الفيزياء والكيمياء</h1>
      <div class="splash__loader">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- ===== APP WRAPPER ===== -->
  <div id="app" class="app hidden">

    <!-- TOP NAVIGATION BAR -->
    <header class="navbar">
      <div class="navbar__brand">
        <img src="assets/icons/icon-192.png" alt="logo" class="navbar__logo" />
        <span class="navbar__title">>أولمبياد الفيزياء والكيمياء </span>
      </div>
      <div class="navbar__actions">
        <!-- Update bell badge -->
        <button class="navbar__btn" id="btn-updates" title="التحديثات" aria-label="التحديثات">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" width="22" height="22">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="badge hidden" id="update-badge">!</span>
        </button>

        <!-- User info button -->
        <button class="navbar__btn" id="btn-profile" title="الملف الشخصي" aria-label="الملف الشخصي">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" width="22" height="22">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- MAIN CONTENT (router outlet) -->
    <main class="main-content" id="page-container">
      <!-- Pages are injected here dynamically -->
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="bottom-nav__item active" data-page="home">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" width="22" height="22">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>الرئيسية</span>
      </button>

      <button class="bottom-nav__item" data-page="lessons">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" width="22" height="22">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span>الدروس</span>
      </button>

      <button class="bottom-nav__item" data-page="exercises">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" width="22" height="22">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span>التمارين</span>
      </button>

      <button class="bottom-nav__item" data-page="updates">
        <span class="badge-dot hidden" id="nav-update-dot"></span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" width="22" height="22">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        <span>التحديثات</span>
      </button>
    </nav>

  </div><!-- /#app -->

  <!-- ===== MODAL (reusable) ===== -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <button class="modal__close" id="modal-close" aria-label="إغلاق">&#10005;</button>
      <div id="modal-content" class="modal__content"></div>
    </div>
  </div>

  <!-- ===== TOAST NOTIFICATION ===== -->
  <div id="toast" class="toast hidden" role="alert" aria-live="polite"></div>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/storage.js"></script>
  <script src="js/updates.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
