<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="description" content="تسجيل التلميذ — أولمبياد المعرفة" />

  <title>التسجيل — أولمبياد المعرفة</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="css/main.css" />

  <style>
    /* ──────────────────────────────────────────
       REGISTER PAGE — EXTRA STYLES
       ────────────────────────────────────────── */

    .register-bg-shapes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .register-bg-shapes span {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
    }

    .register-bg-shapes span:nth-child(1) {
      width: 300px;
      height: 300px;
      top: -60px;
      right: -80px;
    }

    .register-bg-shapes span:nth-child(2) {
      width: 200px;
      height: 200px;
      bottom: -40px;
      left: -60px;
    }

    .register-bg-shapes span:nth-child(3) {
      width: 120px;
      height: 120px;
      top: 40%;
      left: 10%;
      background: rgba(255, 255, 255, 0.03);
    }

    .register-wrapper {
      position: relative;
      z-index: 1;
    }

    /* Steps indicator */
    .register-steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: var(--space-xl);
    }

    .register-step {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--clr-border);
      transition: all var(--transition-normal);
    }

    .register-step.active {
      width: 32px;
      border-radius: 20px;
      background: var(--clr-primary);
    }

    .register-step.completed {
      background: var(--clr-success);
    }

    /* Level select cards */
    .level-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-sm);
      margin-top: var(--space-sm);
    }

    .level-option {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.7rem var(--space-md);
      border-radius: var(--radius-md);
      border: 2px solid var(--clr-border);
      background: var(--clr-bg);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--clr-text);
      cursor: pointer;
      transition: all var(--transition-fast);
      text-align: center;
    }

    .level-option:hover {
      border-color: var(--clr-primary);
      background: var(--clr-primary-light);
    }

    .level-option.selected {
      border-color: var(--clr-primary);
      background: var(--clr-primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
    }

    /* Success animation */
    .register-success {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-xl) 0;
      animation: fadeInUp 0.5s ease both;
    }

    .register-success__check {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--clr-success), #2d8f47);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 0.6s ease;
    }

    .register-success__check svg {
      stroke: #fff;
      stroke-width: 3;
      width: 40px;
      height: 40px;
    }

    .register-success__title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--clr-success);
    }

    .register-success__text {
      font-size: var(--font-size-sm);
      color: var(--clr-text-muted);
      text-align: center;
      max-width: 280px;
    }

    /* Strength bar for name input */
    .input-counter {
      display: flex;
      justify-content: flex-end;
      font-size: var(--font-size-xs);
      color: var(--clr-text-muted);
      margin-top: 2px;
    }

    /* Terms text */
    .terms-text {
      font-size: var(--font-size-xs);
      color: var(--clr-text-muted);
      text-align: center;
      margin-top: var(--space-md);
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- Background Shapes -->
  <div class="register-bg-shapes">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Register Wrapper -->
  <div class="register-wrapper">
    <div class="register-card" id="register-card">

      <!-- Logo -->
      <img
        src="assets/icons/icon-192.png"
        alt="شعار أولمبياد المعرفة"
        class="register-card__logo"
      />

      <!-- Title -->
      <h1 class="register-card__title">أولمبياد المعرفة</h1>
      <p class="register-card__subtitle">أنشئ حسابك للبدء في التعلم والتحدي</p>

      <!-- Steps Indicator -->
      <div class="register-steps" id="register-steps">
        <div class="register-step active" data-step="1"></div>
        <div class="register-step" data-step="2"></div>
        <div class="register-step" data-step="3"></div>
      </div>

      <!-- ===== FORM ===== -->
      <form id="register-form" novalidate>

        <!-- STEP 1: الاسم الكامل -->
        <div class="form-step" id="step-1">
          <div class="form-group">
            <label class="form-label" for="input-fullname">
              👤 الاسم الكامل
            </label>
            <input
              type="text"
              class="form-input"
              id="input-fullname"
              name="fullName"
              placeholder="مثال: أحمد محمد العلوي"
              autocomplete="name"
              maxlength="60"
              required
            />
            <div class="input-counter">
              <span id="name-counter">0 / 60</span>
            </div>
            <p class="form-error hidden" id="error-fullname"></p>
          </div>

          <button type="button" class="btn btn--primary btn--full" id="btn-step1-next">
            التالي
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
        </div>

        <!-- STEP 2: المستوى -->
        <div class="form-step hidden" id="step-2">
          <div class="form-group">
            <label class="form-label">
              🎓 اختر مستواك الدراسي
            </label>

            <div class="level-grid" id="level-grid">
              <div class="level-option" data-level="الأولى إعدادي">الأولى إعدادي</div>
              <div class="level-option" data-level="الثانية إعدادي">الثانية إعدادي</div>
              <div class="level-option" data-level="الثالثة إعدادي">الثالثة إعدادي</div>
              <div class="level-option" data-level="جذع مشترك">جذع مشترك</div>
              <div class="level-option" data-level="الأولى باك">الأولى باك</div>
              <div class="level-option" data-level="الثانية باك">الثانية باك</div>
            </div>

            <input type="hidden" id="input-level" name="level" />
            <p class="form-error hidden" id="error-level"></p>
          </div>

          <div class="flex gap-sm">
            <button type="button" class="btn btn--outline" id="btn-step2-back" style="flex: 0.4;">
              رجوع
            </button>
            <button type="button" class="btn btn--primary" id="btn-step2-next" style="flex: 1;">
              التالي
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
          </div>
        </div>

        <!-- STEP 3: المؤسسة -->
        <div class="form-step hidden" id="step-3">
          <div class="form-group">
            <label class="form-label" for="input-school">
              🏫 اسم المؤسسة التعليمية
            </label>
            <input
              type="text"
              class="form-input"
              id="input-school"
              name="school"
              placeholder="مثال: ثانوية الحسن الثاني"
              autocomplete="organization"
              maxlength="80"
              required
            />
            <div class="input-counter">
              <span id="school-counter">0 / 80</span>
            </div>
            <p class="form-error hidden" id="error-school"></p>
          </div>

          <div class="flex gap-sm">
            <button type="button" class="btn btn--outline" id="btn-step3-back" style="flex: 0.4;">
              رجوع
            </button>
            <button type="submit" class="btn btn--success" id="btn-submit" style="flex: 1;">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
              تسجيل
            </button>
          </div>

          <p class="terms-text">
            بالتسجيل، أنت توافق على استخدام بياناتك لأغراض التعلم فقط.
          </p>
        </div>

      </form>
      <!-- / FORM -->

      <!-- SUCCESS STATE (hidden by default) -->
      <div class="register-success hidden" id="register-success">
        <div class="register-success__check">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h2 class="register-success__title">تم التسجيل بنجاح!</h2>
        <p class="register-success__text">
          مرحباً بك <strong id="success-name"></strong>! سيتم توجيهك إلى التطبيق الآن...
        </p>
        <div class="splash__loader" style="margin-top: var(--space-md);">
          <span style="background: var(--clr-success);"></span>
          <span style="background: var(--clr-success);"></span>
          <span style="background: var(--clr-success);"></span>
        </div>
      </div>

    </div>
  </div>

  <!-- Storage Module (needed for saving) -->
  <script src="js/storage.js"></script>

  <!-- Register Logic -->
  <script>
    /* ============================================================
       REGISTER PAGE — LOGIC
       ============================================================ */
    (() => {

      /* ─────── CHECK IF ALREADY REGISTERED ─────── */
      if (Storage.isRegistered()) {
        window.location.href = 'index.html';
        return;
      }

      /* ─────── STATE ─────── */
      let currentStep   = 1;
      const totalSteps  = 3;
      let selectedLevel = '';

      /* ─────── DOM REFERENCES ─────── */
      const form          = document.getElementById('register-form');
      const successBlock  = document.getElementById('register-success');
      const successName   = document.getElementById('success-name');
      const stepsIndicator = document.getElementById('register-steps');

      // Inputs
      const inputFullName = document.getElementById('input-fullname');
      const inputLevel    = document.getElementById('input-level');
      const inputSchool   = document.getElementById('input-school');

      // Errors
      const errorFullName = document.getElementById('error-fullname');
      const errorLevel    = document.getElementById('error-level');
      const errorSchool   = document.getElementById('error-school');

      // Counters
      const nameCounter   = document.getElementById('name-counter');
      const schoolCounter = document.getElementById('school-counter');

      // Buttons
      const btnStep1Next  = document.getElementById('btn-step1-next');
      const btnStep2Back  = document.getElementById('btn-step2-back');
      const btnStep2Next  = document.getElementById('btn-step2-next');
      const btnStep3Back  = document.getElementById('btn-step3-back');
      const btnSubmit     = document.getElementById('btn-submit');

      // Level options
      const levelGrid     = document.getElementById('level-grid');
      const levelOptions  = levelGrid.querySelectorAll('.level-option');

      /* ─────── STEP NAVIGATION ─────── */

      /**
       * عرض خطوة معينة وإخفاء الباقي
       * @param {number} step
       */
      const goToStep = (step) => {
        if (step < 1 || step > totalSteps) return;
        currentStep = step;

        // إخفاء كل الخطوات
        document.querySelectorAll('.form-step').forEach(el => el.classList.add('hidden'));

        // إظهار الخطوة المطلوبة
        const target = document.getElementById(`step-${step}`);
        if (target) {
          target.classList.remove('hidden');
          target.style.animation = 'fadeInUp 0.3s ease both';
        }

        // تحديث مؤشر الخطوات
        _updateStepsIndicator(step);

        // Focus أول input في الخطوة
        const firstInput = target?.querySelector('input:not([type="hidden"])');
        if (firstInput) setTimeout(() => firstInput.focus(), 300);
      };

      /**
       * تحديث مؤشر الخطوات
       * @param {number} activeStep
       */
      const _updateStepsIndicator = (activeStep) => {
        stepsIndicator.querySelectorAll('.register-step').forEach(dot => {
          const stepNum = parseInt(dot.dataset.step, 10);
          dot.classList.remove('active', 'completed');

          if (stepNum === activeStep) {
            dot.classList.add('active');
          } else if (stepNum < activeStep) {
            dot.classList.add('completed');
          }
        });
      };

      /* ─────── VALIDATION ─────── */

      /**
       * التحقق من صلاحية حقل
       * @param {HTMLElement} input
       * @param {HTMLElement} errorEl
       * @param {string} message
       * @param {function} validator — دالة تُعيد true إذا صالح
       * @returns {boolean}
       */
      const _validateField = (input, errorEl, message, validator) => {
        const value = (input.value || selectedLevel).trim();

        if (!validator(value)) {
          if (input.classList) input.classList.add('error');
          if (errorEl) {
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
          }
          return false;
        }

        if (input.classList) input.classList.remove('error');
        if (errorEl) errorEl.classList.add('hidden');
        return true;
      };

      /** التحقق من الخطوة 1 */
      const validateStep1 = () => {
        return _validateField(
          inputFullName,
          errorFullName,
          'الرجاء إدخال الاسم الكامل (3 أحرف على الأقل)',
          (val) => val.length >= 3
        );
      };

      /** التحقق من الخطوة 2 */
      const validateStep2 = () => {
        if (!selectedLevel) {
          errorLevel.textContent = 'الرجاء اختيار المستوى الدراسي';
          errorLevel.classList.remove('hidden');
          return false;
        }
        errorLevel.classList.add('hidden');
        return true;
      };

      /** التحقق من الخطوة 3 */
      const validateStep3 = () => {
        return _validateField(
          inputSchool,
          errorSchool,
          'الرجاء إدخال اسم المؤسسة (3 أحرف على الأقل)',
          (val) => val.length >= 3
        );
      };

      /* ─────── LEVEL SELECTION ─────── */

      levelOptions.forEach(option => {
        option.addEventListener('click', () => {
          // إزالة التحديد من الكل
          levelOptions.forEach(opt => opt.classList.remove('selected'));

          // تحديد الخيار الحالي
          option.classList.add('selected');
          selectedLevel = option.dataset.level;
          inputLevel.value = selectedLevel;

          // إخفاء الخطأ
          errorLevel.classList.add('hidden');
        });

        // دعم لوحة المفاتيح
        option.setAttribute('tabindex', '0');
        option.setAttribute('role', 'radio');
        option.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            option.click();
          }
        });
      });

      /* ─────── CHARACTER COUNTERS ─────── */

      inputFullName.addEventListener('input', () => {
        nameCounter.textContent = `${inputFullName.value.length} / 60`;
        if (inputFullName.value.length >= 3) {
          inputFullName.classList.remove('error');
          errorFullName.classList.add('hidden');
        }
      });

      inputSchool.addEventListener('input', () => {
        schoolCounter.textContent = `${inputSchool.value.length} / 80`;
        if (inputSchool.value.length >= 3) {
          inputSchool.classList.remove('error');
          errorSchool.classList.add('hidden');
        }
      });

      /* ─────── BUTTON EVENTS ─────── */

      // Step 1 → Step 2
      btnStep1Next.addEventListener('click', () => {
        if (validateStep1()) goToStep(2);
      });

      // Step 2 → Step 1
      btnStep2Back.addEventListener('click', () => goToStep(1));

      // Step 2 → Step 3
      btnStep2Next.addEventListener('click', () => {
        if (validateStep2()) goToStep(3);
      });

      // Step 3 → Step 2
      btnStep3Back.addEventListener('click', () => goToStep(2));

      // Enter key navigation
      inputFullName.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          btnStep1Next.click();
        }
      });

      inputSchool.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          btnSubmit.click();
        }
      });

      /* ─────── FORM SUBMIT ─────── */

      form.addEventListener('submit', (e) => {
        e.preventDefault();

        // التحقق النهائي
        if (!validateStep1() || !validateStep2() || !validateStep3()) {
          return;
        }

        // تعطيل زر الإرسال
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = `
          <div class="splash__loader" style="transform: scale(0.5);">
            <span style="background: #fff;"></span>
            <span style="background: #fff;"></span>
            <span style="background: #fff;"></span>
          </div>
          جاري التسجيل...
        `;

        // حفظ البيانات
        const studentData = {
          fullName: inputFullName.value.trim(),
          level   : selectedLevel,
          school  : inputSchool.value.trim(),
        };

        setTimeout(() => {
          Storage.saveStudent(studentData);

          // إخفاء الفورم وعرض النجاح
          form.classList.add('hidden');
          stepsIndicator.classList.add('hidden');

          successName.textContent = studentData.fullName;
          successBlock.classList.remove('hidden');

          // التوجيه إلى الصفحة الرئيسية بعد 2 ثانية
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);

        }, 800); // محاكاة تأخير بسيط
      });

      /* ─────── INIT ─────── */
      goToStep(1);

    })();
  </script>

</body>
</html>
